<!DOCTYPE html>
<html>
<head>
  <title>Sanika Porwal | Luxury AI Visual Artist</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: #f5f5f5;
    }

    /* Background Layer */

    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(rgba(5,5,7,0.75), rgba(5,5,7,0.85)),
        radial-gradient(circle at 50% 30%, rgba(198,167,94,0.15), transparent 60%),
        #0b0b0f;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Subtle Gold Glow */

    .background::after {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(198,167,94,0.15), transparent 70%);
      filter: blur(80px);
      z-index: 0;
    }

    /* Content */

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 900px;
      padding: 20px;
      animation: fadeIn 2s ease forwards;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 90px;
      font-weight: 600;
      letter-spacing: 2px;
      line-height: 1.1;
    }

    .accent {
      color: #c6a75e;
    }

    .divider {
      width: 140px;
      height: 2px;
      background: #c6a75e;
      margin: 40px auto;
      box-shadow: 0 0 20px rgba(198,167,94,0.4);
    }

    p {
      font-size: 18px;
      font-weight: 300;
      opacity: 0.85;
      line-height: 1.7;
    }

    .cta {
      margin-top: 50px;
      font-size: 13px;
      letter-spacing: 3px;
      color: #c6a75e;
      text-decoration: none;
      display: inline-block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>

  <div class="background">
    <div class="content">

      <h1>
        Sanika <span class="accent">Porwal</span>
      </h1>

      <div class="divider"></div>

      <p>
        Luxury AI Visual Artist crafting mythological cinematic worlds,
        divine storytelling, and premium AI experiences inspired by
        Indian heritage and timeless aesthetics.
      </p>

      <a href="#" class="cta">ENTER PORTFOLIO ↓</a>

    </div>
  </div>

</body>
</html>
