<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: radial-gradient(circle at center, #2a1a00, #000000 70%);
  color: white;
  overflow: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  position: relative;
}

/* GOLD GLOW EFFECT */
.hero::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(255,200,100,0.25), transparent 70%);
  filter: blur(120px);
  z-index: 0;
}

/* TEXT */
h1 {
  font-size: 64px;
  letter-spacing: 2px;
  z-index: 1;
}

h1 span {
  color: #d4af37;
  text-shadow: 0 0 20px rgba(212,175,55,0.5);
}

p {
  max-width: 600px;
  font-size: 18px;
  opacity: 0.8;
  margin-top: 20px;
  z-index: 1;
}

/* PARTICLES */
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(255,215,120,0.8);
  border-radius: 50%;
  animation: float 8s linear infinite;
}

@keyframes float {
  from {
    transform: translateY(100vh);
    opacity: 0;
  }
  to {
    transform: translateY(-10vh);
    opacity: 1;
  }
}
</style>
