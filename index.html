<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sanika Porwal</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #0b0f14;
  color: #fff;
}

/* HERO SECTION */
.hero {
  height: 100vh;
 background: url('imagesai-bg.jpg.png') no-repeat center center/cover;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* DARK OVERLAY */
.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(5, 8, 12, 0.95) 35%,
    rgba(5, 8, 12, 0.4) 70%
  );
}

/* CONTENT */
.content {
  position: relative;
  z-index: 2;
  padding: 60px 80px;
  max-width: 700px;
}

/* NAVBAR */
.nav {
  position: absolute;
  top: 30px;
  left: 80px;
  right: 80px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 3;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
}

.nav-links {
  display: flex;
  gap: 40px;
}

.nav-links a {
  text-decoration: none;
  color: #ccc;
  font-size: 14px;
  transition: 0.3s;
}

.nav-links a:hover {
  color: #c8a96a;
}

/* TEXT */
.title {
  font-family: 'Playfair Display', serif;
  font-size: 64px;
  margin-bottom: 20px;
}

.subtitle {
  font-size: 18px;
  color: #d1d5db;
  margin-bottom: 20px;
}

.desc {
  font-size: 14px;
  color: #9ca3af;
  line-height: 1.6;
}

.cta {
  margin-top: 40px;
  color: #c8a96a;
  font-size: 14px;
}

/* BUTTONS */
.cta-buttons {
  margin-top: 30px;
  display: flex;
  gap: 20px;
}

.cta-buttons a {
  text-decoration: none;
  font-size: 14px;
  padding: 12px 26px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  transition: 0.3s;
}

.cta-buttons a:hover {
  border-color: #c8a96a;
  color: #c8a96a;
  box-shadow: 0 0 20px rgba(200,169,106,0.2);
}

/* RESPONSIVE */
@media(max-width: 900px){
  .title { font-size: 42px; }
  .content { padding: 40px; }
  .nav { left: 40px; right: 40px; }
}
</style>
</head>

<body>

<section class="hero">

  <!-- NAVBAR -->
  <div class="nav">
    <div class="logo">Sanika Porwal</div>
    <div class="nav-links">
      <a href="#">About</a>
      <a href="#">Portfolio</a>
      <a href="#">Contact</a>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <h1 class="title">Sanika Porwal</h1>

    <div class="subtitle">
      AI Cinematic Visual Director & Video Editor
    </div>

    <div class="desc">
      Crafting luxury campaigns & immersive digital stories<br>
      Inspired by modern creativity and futuristic technology
    </div>

    <div class="cta">↓ Explore Work</div>

    <div class="cta-buttons">
      <a href="#">View Portfolio</a>
      <a href="#">Contact Me</a>
    </div>

  </div>

</section>

</body>
</html>
