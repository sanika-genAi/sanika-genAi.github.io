<style>

/* BASE */

body {
  margin: 0;
  overflow: hidden;
  background: #050507;
  font-family: 'Inter', sans-serif;
}

/* MULTI LAYER BACKGROUND */

.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* LAYER 1 — SOFT GOLD LIGHT */

.bg::before {
  content: "";
  position: absolute;
  width: 120%;
  height: 120%;
  background: radial-gradient(circle at 30% 40%, rgba(198,167,94,0.25), transparent 60%),
              radial-gradient(circle at 70% 60%, rgba(198,167,94,0.15), transparent 70%);
  filter: blur(120px);
  animation: slowMove 18s infinite alternate ease-in-out;
}

/* LAYER 2 — DARK DEPTH GRADIENT */

.bg::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, rgba(20,20,25,0.4), #050507 80%);
}

/* LAYER 3 — MOVING LIGHT BEAMS */

.light {
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(198,167,94,0.12), transparent 70%);
  filter: blur(80px);
  animation: float 12s infinite alternate ease-in-out;
}

.light:nth-child(1) {
  top: 10%;
  left: 20%;
}

.light:nth-child(2) {
  bottom: 10%;
  right: 20%;
  animation-delay: 3s;
}

.light:nth-child(3) {
  top: 50%;
  left: 60%;
  animation-delay: 6s;
}

/* LAYER 4 — FILM GRAIN TEXTURE */

.grain {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: url("https://grainy-gradients.vercel.app/noise.svg");
  opacity: 0.04;
  mix-blend-mode: overlay;
}

/* ANIMATIONS */

@keyframes float {
  from { transform: translate(0,0); }
  to { transform: translate(80px,-60px); }
}

@keyframes slowMove {
  from { transform: translate(0,0); }
  to { transform: translate(-60px,40px); }
}

</style>
