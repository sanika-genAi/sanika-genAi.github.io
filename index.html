<style>

/* MAIN BG */

body {<div class="scene">

  <div class="sky"></div>

  <div class="glow"></div>
  <div class="glow"></div>

  <div class="arch"></div>
  <div class="arch"></div>

  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>

</div>
  margin: 0;
  overflow: hidden;
  background: #050507;
}

/* SCENE CONTAINER */

.scene {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* LAYER 1 — GRADIENT SKY */

.sky {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    120deg,
    #050507 30%,
    #1a1408 60%,
    #2a1d0a 100%
  );
}

/* LAYER 2 — LIGHT GLOW */

.glow {
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(198,167,94,0.3), transparent 70%);
  filter: blur(120px);
  animation: float 20s infinite alternate ease-in-out;
}

.glow:nth-child(2) {
  top: 10%;
  left: 20%;
}

.glow:nth-child(3) {
  bottom: 10%;
  right: 20%;
  animation-delay: 5s;
}

/* LAYER 3 — HERITAGE SHAPES */

.arch {
  position: absolute;
  width: 300px;
  height: 500px;
  border: 2px solid rgba(198,167,94,0.1);
  border-radius: 200px 200px 0 0;
  bottom: -100px;
  opacity: 0.2;
}

.arch:nth-child(4) {
  left: 20%;
}

.arch:nth-child(5) {
  left: 60%;
}

/* LAYER 4 — PARTICLES */

.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #c6a75e;
  opacity: 0.6;
  animation: rise 10s infinite linear;
}

@keyframes rise {
  from {
    transform: translateY(100vh);
    opacity: 0;
  }
  to {
    transform: translateY(-10vh);
    opacity: 1;
  }
}

/* RANDOM POSITIONS */

.particle:nth-child(6) { left: 10%; animation-delay: 1s; }
.particle:nth-child(7) { left: 30%; animation-delay: 3s; }
.particle:nth-child(8) { left: 50%; animation-delay: 5s; }
.particle:nth-child(9) { left: 70%; animation-delay: 2s; }
.particle:nth-child(10){ left: 90%; animation-delay: 4s; }

/* MOTION */

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(-60px); }
}

</style>
