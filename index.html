<!DOCTYPE html>
<html>
<head>
  <title>Sanika Porwal</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: white;
      background: #050507;
    }

    /* BACKGROUND */

    .scene {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .sky {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, #050507, #1a1408, #2a1d0a);
    }

    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(198,167,94,0.3), transparent 70%);
      filter: blur(120px);
      animation: float 15s infinite alternate ease-in-out;
    }

    .glow:nth-child(2) {
      top: 20%;
      left: 20%;
    }

    .glow:nth-child(3) {
      bottom: 10%;
      right: 20%;
    }

    @keyframes float {
      from { transform: translateY(0); }
      to { transform: translateY(-60px); }
    }

    /* CONTENT */

    .content {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 80px;
    }

    .gold {
      color: #c6a75e;
    }

    .line {
      width: 120px;
      height: 2px;
      background: #c6a75e;
      margin: 20px 0;
    }

    p {
      max-width: 600px;
      opacity: 0.8;
      line-height: 1.6;
    }

  </style>
</head>

<body>

  <!-- BACKGROUND -->
  <div class="scene">
    <div class="sky"></div>
    <div class="glow"></div>
    <div class="glow"></div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <h1>Sanika <span class="gold">Porwal</span></h1>
    <div class="line"></div>
    <p>
      AI Cinematic Visual Director crafting luxury visual campaigns,
      immersive storytelling, and premium AI experiences inspired by
      modern creativity and Indian heritage.
    </p>
  </div>

</body>
</html>
