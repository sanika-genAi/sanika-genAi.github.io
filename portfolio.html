<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio - Sanika Porwal</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0b0f14;
  color: #fff;
  font-family: 'Inter', sans-serif;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  padding: 30px 80px;
}

.logo {
  font-family: 'Playfair Display', serif;
}

.nav a {
  color: #ccc;
  text-decoration: none;
  margin-left: 30px;
}

/* HEADER */
.header {
  padding: 80px;
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
}

.header p {
  color: #9ca3af;
  margin-top: 10px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
  padding: 0 80px 80px;
}

/* CARD */
.card {
  position: relative;
  overflow: hidden;
  border-radius: 14px;
  cursor: pointer;
  background: #000;
}

/* VIDEO */
.card video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.5s;
}

/* HOVER ZOOM */
.card:hover video {
  transform: scale(1.1);
}

/* OVERLAY */
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  opacity: 0;
  transition: 0.4s;
  display: flex;
  align-items: flex-end;
  padding: 20px;
}

.card:hover .overlay {
  opacity: 1;
}

.overlay h3 {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
}

/* RESPONSIVE */
@media(max-width: 900px){
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">Sanika Porwal</div>
  <div>
    <a href="index.html">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>Portfolio</h1>
  <p>Cinematic AI Films & Visual Experiences</p>
</div>

<!-- GRID -->
<div class="grid">

<div class="grid">

 <div class="card" onclick="openVideo('https://www.youtube.com/embed/T9DLeBu5N_s')">
  <img src="images/thumb1.jpg">
  <div class="overlay"><h3>AI Cinematic Reel</h3></div>
</div>
  <div class="card" onclick="openVideo('https://www.youtube.com/embed/VIDEO2')">
    <img src="images/thumb2.jpg">
    <div class="overlay"><h3>Luxury AI Ad</h3></div>
  </div>

</div>
<div id="videoModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeVideo()">&times;</span>
    <iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
  </div>
</div>

<script>
function openVideo(url){
  document.getElementById("videoModal").style.display = "flex";
  document.getElementById("videoFrame").src = url + "?autoplay=1";
}

function closeVideo(){
  document.getElementById("videoModal").style.display = "none";
  document.getElementById("videoFrame").src = "";
}
</script>
</body>
</html>
